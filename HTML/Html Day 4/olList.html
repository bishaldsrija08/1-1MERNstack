<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordered list</title>
</head>
<body>
    <ol>
        <li>Fruits</li>
        <ol>
            <li>Mango</li>
            <li>Apple</li>
            <li>Orange</li>
        </ol>

        <li>Vegetables</li>
        <ol>
            <li>Tomato</li>
            <li>Onion</li>
            <li>Capsicon</li>
            <ol>
                <li>Green Capsicon</li>
                <li>Red Capsicon</li>
                <li>Yellow Capsicon</li>
            </ol>
        </ol>
    </ol>
</body>
</html>
