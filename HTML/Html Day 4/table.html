<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>
<body>
    <!-- Table in HTML -->
     <table border="1">
        <thead>
            <tr style="height: 100px">
                <th style="width: 70%;">Name</th>
                <th>Age</th>
                <th>Country</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John Doe</td>
                <td>30</td>
                <td>USA</td>
            </tr>
            <tr>
                <td>Jane Smith</td>
                <td>25</td>
                <td>UK</td>
            </tr>
            <tr>
                <td>Emily Johnson</td>
                <td>28</td>
                <td>Canada</td>
            </tr>
            <tr>
                <td>Michael Brown</td>
                <td>35</td>
                <td>Australia</td>
            </tr>
        </tbody>
     </table>
</body>
</html>
