<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Row span and col span</title>
</head>
<body>
    <!-- col span -->
   <table border="1">
    <thead>
        <tr>
            <th colspan="2">Name</th>
            <th colspan="2">Marks</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>John</td>
            <td>Rai</td>
            <td>90</td>
            <td>80</td>
        </tr>
        <tr>
            <td>Jane</td>
            <td>Smith</td>
            <td>85</td>
            <td>95</td>
        </tr>
    </tbody>
   </table> 

   <!-- Practical -->
    <table border="1">
        <thead>
            <tr>
                <th rowspan="2">Gender</th>
                <th colspan="2">Average</th>
                <th rowspan="2">Red Eyes</th>
            </tr>
            <tr>
                <th>Height</th>
                <th>Weight</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><b>Male</b></td>
                <td>5.8</td>
                <td>70</td>
                <td>No</td>
            </tr>
            <tr>
                <td><b>Female</b></td>
                <td>5.6</td>
                <td>60</td>
                <td>Yes</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
