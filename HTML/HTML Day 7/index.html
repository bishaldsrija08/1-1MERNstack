<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTMl Day 8</title>
</head>
<body>
    <form action="submit.html" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="Bishal Rijal" readonly><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="abc@gmail.com" disabled><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" size="50" required><br><br>

        <label for="pin">PIN: </label>
        <input type="text" autofocus id="pin" name="pin" size="10" maxlength="4"><br><br>

        <label for="phone">Phone:</label>
        <input type="tel" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" id="phone" name="phone" minlength="10" maxlength="10"><br><br>
        <label for="id">Student ID: </label>
        <input type="text" id="id" name="id" size="10" pattern="SR-[0-9]{4}" required><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
