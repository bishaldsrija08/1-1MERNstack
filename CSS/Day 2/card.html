<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="card.css" />
  </head>
  <body>
    <div id="main">
      <p id="left">id: 123456789</p>
      <img
        src="https://i5.walmartimages.com/asr/c902713a-690a-4bb5-816a-2947651a3528.a9792549f0d5089dc741390e01a8fbea.jpeg?odnHeight=612&odnWidth=612&odnBg=FFFFFF"
        alt="Apple iPhone 15 Pro"
        width="400px"
      />

      <div class="iphone">
        <p>Apple iPhone 15 Pro</p>
        <span>★★★★★</span> <span class="gray">✉︎ 97</span>
      </div>

      <div class="iphone">
        <table>
          <tr>
            <td>
              <p><del class="gray">$999.00</del> <ins id="blue">-10%</ins></p>
              <h2>$899.00</h2>
            </td>
            <td>
              <i
                class="fa fa-shopping-cart"
                style="font-size: 48px; color: blue"
              ></i>
            </td>
          </tr>
        </table>
      </div>
    </div>
  </body>
</html>
